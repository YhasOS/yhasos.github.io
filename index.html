<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <title>BioIPTV</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div>
      <h1>BioIPTV</h1>
      <p>Reproductor M3U privado</p>
    </div>
    <button id="installBtn" hidden>Instalar</button>
  </header>

  <main>
    <section class="card setup">
      <label for="m3uUrl">URL M3U</label>
      <div class="row">
        <input id="m3uUrl" type="url" placeholder="https://.../lista.m3u" autocomplete="off" />
        <button id="loadBtn">Cargar</button>
      </div>
      <small>La URL se guarda solo en este dispositivo.</small>
    </section>

    <section class="player card">
      <video id="video" controls playsinline webkit-playsinline></video>
      <div class="now">
        <strong id="nowTitle">Sin canal seleccionado</strong>
        <button id="fullscreenBtn">Pantalla completa</button>
      </div>
    </section>

    <section class="card tools">
      <input id="search" type="search" placeholder="Buscar canal..." />
      <span id="count">0 canales</span>
    </section>

    <section id="channels" class="channels"></section>
  </main>

  <footer>
    BioIPTV · Sin anuncios · Uso privado
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="app.js"></script>
</body>
</html>
