<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi IPTV Player</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #bb86fc;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 320px;
            background-color: var(--surface-color);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2d2d2d;
        }

        .config-box {
            padding: 15px;
            border-bottom: 1px solid #2d2d2d;
            text-align: center;
        }

        .config-box h3 {
            margin: 0 0 5px 0;
            font-size: 16px;
            color: var(--primary-color);
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .channel-item {
            padding: 12px 20px;
            border-bottom: 1px solid #2d2d2d;
            cursor: pointer;
            transition: background 0.2s;
        }

        .channel-item:hover {
            background-color: #2d2d2d;
        }

        .channel-item.active {
            border-left: 4px solid var(--primary-color);
            background-color: #251c33;
        }

        .player-area {
            flex: 1;
            display: flex;
            background: #000;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            outline: none;
        }

        @media (max-width: 768px) {
            .main-container { flex-direction: column-reverse; }
            .sidebar { width: 100%; height: 40%; }
            .player-area { height: 60%; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="sidebar">
            <div class="config-box">
                <h3>Mi Televisión Privada</h3>
                <small id="status" style="color: #aaa;">Conectando al proxy...</small>
            </div>
            <ul class="channel-list" id="playlist">
                <li class="channel-item">Cargando canales automáticamente...</li>
            </ul>
        </div>

        <div class="player-area">
            <video id="video" controls autoplay></video>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const playlistUI = document.getElementById('playlist');
        const statusText = document.getElementById('status');
        let hls = null;

        // URL base de tu Cloudflare Worker
        const MI_PROXY_BASE = "https://solitary-sky-5274.yhasos.workers.dev/";

        window.addEventListener('DOMContentLoaded', () => {
            // Pedimos la lista pasándole un parámetro especial para indicar que queremos la lista M3U
            procesarM3U(MI_PROXY_BASE + "?get=lista");
        });

        async function procesarM3U(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Error al obtener los datos');
                const text = await response.text();
                const canales = parseM3U(text);
                renderCanales(canales);
                statusText.innerText = `Canales cargados: ${canales.length}`;
                statusText.style.color = "#bb86fc";
            } catch (error) {
                playlistUI.innerHTML = `<li class="channel-item" style="color:#ff6b6b;">Error al conectar con tu Proxy de Cloudflare.</li>`;
                statusText.innerText = "Error de conexión";
                statusText.style.color = "#ff6b6b";
                console.error(error);
            }
        }

        function parseM3U(text) {
            const lines = text.split('\n');
            const channels = [];
            let currentName = "";

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const parts = line.split(',');
                    currentName = parts[parts.length - 1] || 'Canal sin nombre';
                } else if (line.startsWith('http') && currentName) {
                    channels.push({ name: currentName, url: line });
                    currentName = "";
                }
            }
            return channels;
        }

        function renderCanales(canales) {
            playlistUI.innerHTML = '';
            if (canales.length === 0) {
                playlistUI.innerHTML = '<li class="channel-item">No se encontraron canales válidos.</li>';
                return;
            }

            canales.forEach((canal) => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                li.innerText = canal.name;
                li.onclick = () => prepararReproduccion(canal.url, li);
                playlistUI.appendChild(li);
            });
        }

        function prepararReproduccion(urlOriginal, element) {
            // Pasamos la URL original del canal como parámetro a nuestro Worker para que actúe de puente seguro (HTTPS)
            const urlConProxy = MI_PROXY_BASE + "?stream=" + encodeURIComponent(urlOriginal);
            reproducir(urlConProxy, element);
        }

        function reproducir(url, element) {
    // Esto fuerza a Android o PC a abrir VLC con el enlace http directo
    window.location.href = "vlc://" + url;
}

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
