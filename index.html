<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BioIPTV</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{--bg:#07101f;--panel:#101b2d;--panel2:#0b1424;--line:#27405f;--text:#eef6ff;--muted:#98b6d8;--blue:#3478f6;--red:#bd3048;--chip:#0c213b}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#050912,#0b1528);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-weight:650}.wrap{max-width:1500px;margin:0 auto;padding:22px}.top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:14px}.logo{width:55px;height:55px;border-radius:16px;background:linear-gradient(135deg,#3182ff,#8b5cf6);display:grid;place-items:center;font-weight:900}.brand h1{margin:0;font-size:30px}.brand p{margin:2px 0 0;color:var(--muted);font-weight:500}.settings{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:18px}.row{display:grid;grid-template-columns:1fr 1fr auto auto;gap:10px;align-items:end}.field label{display:block;color:#bcd3f1;font-size:14px;margin:0 0 6px}.field input,.search,select{width:100%;padding:13px 14px;border-radius:12px;background:#050b15;border:1px solid #294867;color:white;font-size:15px}.btn{border:0;border-radius:13px;background:#286cf0;color:white;padding:14px 18px;font-weight:900;font-size:15px;cursor:pointer}.btn.secondary{background:#172842;border:1px solid #2b4565}.btn.danger{background:var(--red)}.hint{color:var(--muted);font-size:13px;margin-top:8px;font-weight:500}.main{display:grid;grid-template-columns:360px 1fr;gap:16px}.side,.playerCard{background:rgba(16,27,45,.92);border:1px solid var(--line);border-radius:20px;padding:14px;min-height:620px}.sideHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.side h2{margin:0;font-size:23px}.count{color:#c7e1ff}.tabs,.chips{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.tab,.chip{padding:9px 13px;border-radius:999px;background:#081424;border:1px solid #294867;color:white;cursor:pointer;font-weight:700}.tab.active,.chip.active{background:#174bb3;border-color:#3977ff}.adult{display:flex;gap:8px;align-items:center;color:#c9dfff;font-weight:500;margin:8px 0}.list{height:420px;overflow:auto;padding-right:6px}.chan{display:flex;gap:10px;align-items:center;padding:10px;border:1px solid #203954;background:#07111f;border-radius:13px;margin-bottom:8px;cursor:pointer}.chan.active{background:#123d8c;border-color:#2e78ff}.chan img{width:38px;height:38px;object-fit:contain;background:#02050b;border-radius:9px}.ctitle{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cgroup{color:#8fb3db;font-size:12px;margin-top:2px;font-weight:500}.videoWrap{position:relative;background:#111;border-radius:18px;overflow:hidden;min-height:420px;display:grid;place-items:center}.videoWrap video{width:100%;height:100%;min-height:420px;background:#111}.message{position:absolute;inset:0;display:grid;place-items:center;color:#d9eaff;text-align:center;padding:20px;pointer-events:none}.now{display:flex;align-items:center;gap:12px;margin:16px 0}.now img{width:54px;height:54px;object-fit:contain;background:#02050b;border-radius:12px}.now h2{margin:0;font-size:24px}.now p{margin:3px 0;color:var(--muted);font-weight:500}.controls{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto}.log{background:#06101d;border:1px solid #223a57;border-radius:13px;padding:12px;color:#aec7e6;min-height:48px;font-weight:500;white-space:pre-wrap}.hidden{display:none!important}@media(max-width:900px){.wrap{padding:10px}.row{grid-template-columns:1fr}.main{grid-template-columns:1fr}.side{min-height:auto}.list{height:340px}.videoWrap video,.videoWrap{min-height:250px}.controls{margin-left:0}.now{align-items:flex-start;flex-wrap:wrap}.brand h1{font-size:24px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="brand"><div class="logo">TV</div><div><h1>BioIPTV</h1><p>Reproductor privado M3U · HLS con proxy completo</p></div></div><button id="installBtn" class="btn secondary hidden">Instalar app</button></div>
  <div class="settings">
    <div class="row">
      <div class="field"><label>URL M3U</label><input id="m3uUrl" type="password" placeholder="Pega aquí tu URL M3U" autocomplete="off"></div>
      <div class="field"><label>Proxy Worker</label><input id="proxyUrl" placeholder="https://...workers.dev/"></div>
      <button class="btn" id="loadBtn">Cargar lista</button><button class="btn danger" id="clearBtn">Borrar</button>
    </div>
    <div class="hint">Esta versión reescribe también los segmentos del HLS dentro del Worker. Es la corrección importante para que no se quede en 0:00.</div>
  </div>
  <div class="main">
    <aside class="side">
      <div class="sideHead"><h2>Canales</h2><div class="count"><span id="shownCount">0</span> / <span id="totalCount">0</span></div></div>
      <input id="search" class="search" placeholder="Buscar canal...">
      <div class="tabs"><button class="tab active" data-mode="all">Todos</button><button class="tab" data-mode="fav">Favoritos</button><button class="tab" data-mode="recent">Recientes</button></div>
      <label class="adult"><input type="checkbox" id="adultToggle"> Mostrar adultos</label>
      <select id="groupSelect"><option value="">Todas las categorías</option></select>
      <div class="chips" id="quickChips"></div>
      <div class="list" id="list"></div>
    </aside>
    <section class="playerCard">
      <div class="videoWrap"><video id="video" controls playsinline crossorigin="anonymous"></video><div id="msg" class="message">Selecciona un canal</div></div>
      <div class="now"><img id="nowLogo" alt="" class="hidden"><div><h2 id="nowTitle">Sin canal seleccionado</h2><p id="nowGroup">Carga tu lista M3U para empezar.</p></div><div class="controls"><button id="favBtn" class="btn secondary">☆ Favorito</button><button id="prevBtn" class="btn secondary">Anterior</button><button id="nextBtn" class="btn secondary">Siguiente</button><button id="fullBtn" class="btn">Pantalla completa</button></div></div>
      <div id="log" class="log">Preparado.</div>
    </section>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const $=id=>document.getElementById(id);let channels=[],filtered=[],current=-1,hls=null,mode='all';
let favs=new Set(JSON.parse(localStorage.bioiptv_favs||'[]'));let recents=JSON.parse(localStorage.bioiptv_recents||'[]');
$('m3uUrl').value=localStorage.bioiptv_m3u||'';$('proxyUrl').value=localStorage.bioiptv_proxy||'';
function log(t){$('log').textContent=t}function normProxy(p){return p?(p.endsWith('/')?p:p+'/'):''}function prox(url){const p=normProxy($('proxyUrl').value.trim());return p?p+'?url='+encodeURIComponent(url):url}
function forceHls(url){try{const u=new URL(url); if(u.searchParams.get('output')==='mpegts'){u.searchParams.set('output','m3u8');return u.toString()} }catch(e){} return url}
function parseM3U(txt){const lines=txt.split(/\r?\n/);const out=[];let info=null;for(const raw of lines){const line=raw.trim();if(!line)continue;if(line.startsWith('#EXTINF')){const attrs={};line.replace(/([\w-]+)="([^"]*)"/g,(_,k,v)=>(attrs[k]=v));const name=(line.split(',').slice(1).join(',')||attrs['tvg-name']||'Canal').trim();info={name,logo:attrs['tvg-logo']||'',group:attrs['group-title']||'Sin categoría',id:attrs['tvg-id']||''};}else if(!line.startsWith('#')&&info){out.push({...info,url:line});info=null;}}return out}
const adultRx=/adult|xxx|porn|sexo|sex|erotic|18\+|for adults/i;function isAdult(c){return adultRx.test(c.name+' '+c.group)}
function smartTags(c){const s=(c.name+' '+c.group).toLowerCase(),a=[];if(/\bes\b|spain|españa|spanish|movistar|dazn|laliga|telecinco|antena/.test(s))a.push('ES');if(/sport|deporte|dazn|laliga|futbol|football|nba|tennis|formula|f1|motor/.test(s))a.push('Deportes');if(/cine|movie|cinema|pelicula|film/.test(s))a.push('Cine');if(/vod|video on demand|pel[ií]culas|series/.test(s))a.push('VOD');if(/kid|infantil|niño|cartoon|disney/.test(s))a.push('Infantil');if(/docu|history|national geographic|discovery/.test(s))a.push('Documentales');if(isAdult(c))a.push('Adultos');return a}
function renderGroups(){const groups=[...new Set(channels.map(c=>c.group).filter(Boolean))].sort();$('groupSelect').innerHTML='<option value="">Todas las categorías</option>'+groups.map(g=>`<option>${esc(g)}</option>`).join('');const chips=['ES','DAZN','Deportes','Cine','VOD','Adultos','Movistar','Infantil','Documentales'];$('quickChips').innerHTML=chips.map(c=>`<button class="chip" data-chip="${c}">${c}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('search').value=b.dataset.chip;renderList()})}
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function applyFilter(){const q=$('search').value.toLowerCase().trim(),g=$('groupSelect').value,showAdult=$('adultToggle').checked;let arr=channels.filter(c=>showAdult||!isAdult(c));if(mode==='fav')arr=arr.filter(c=>favs.has(c.url));if(mode==='recent')arr=recents.map(u=>channels.find(c=>c.url===u)).filter(Boolean);if(g)arr=arr.filter(c=>c.group===g);if(q)arr=arr.filter(c=>(c.name+' '+c.group+' '+smartTags(c).join(' ')).toLowerCase().includes(q));filtered=arr;$('shownCount').textContent=arr.length;$('totalCount').textContent=channels.length}
function renderList(){applyFilter();$('list').innerHTML=filtered.map((c,i)=>`<div class="chan ${channels[current]?.url===c.url?'active':''}" data-i="${i}">${c.logo?`<img src="${prox(c.logo)}" onerror="this.style.visibility='hidden'">`:'<img style="visibility:hidden">'}<div><div class="ctitle">${esc(c.name)}</div><div class="cgroup">${esc(c.group)}</div></div></div>`).join('')||'<p style="color:#93acc9">No hay canales.</p>';document.querySelectorAll('.chan').forEach(el=>el.onclick=()=>play(filtered[+el.dataset.i]))}
async function loadList(){const m=$('m3uUrl').value.trim(),p=$('proxyUrl').value.trim();if(!m||!p){alert('Pon la URL M3U y el Worker.');return}localStorage.bioiptv_m3u=m;localStorage.bioiptv_proxy=p;log('Descargando lista...');const res=await fetch(prox(m));if(!res.ok)throw new Error('HTTP '+res.status);const txt=await res.text();channels=parseM3U(txt);renderGroups();renderList();log('Lista cargada: '+channels.length+' canales.');alert('Lista cargada correctamente: '+channels.length+' canales')}
async function play(c){if(!c)return;current=channels.findIndex(x=>x.url===c.url);renderList();$('msg').textContent='Cargando canal...';$('msg').classList.remove('hidden');$('nowTitle').textContent=c.name;$('nowGroup').textContent=c.group;$('nowLogo').src=c.logo?prox(c.logo):'';$('nowLogo').classList.toggle('hidden',!c.logo);localStorage.bioiptv_last=c.url;recents=[c.url,...recents.filter(u=>u!==c.url)].slice(0,50);localStorage.bioiptv_recents=JSON.stringify(recents);$('favBtn').textContent=favs.has(c.url)?'★ Favorito':'☆ Favorito';const video=$('video');video.pause();video.removeAttribute('src');video.load();if(hls){hls.destroy();hls=null}const src=prox(forceHls(c.url));log('Intentando reproducir:\n'+c.name+'\nModo: HLS/Proxy completo');try{if(window.Hls&&Hls.isSupported()){hls=new Hls({enableWorker:true,lowLatencyMode:false,maxBufferLength:30});hls.on(Hls.Events.ERROR,(ev,data)=>{log('Error HLS: '+data.type+' / '+data.details+(data.response?(' / HTTP '+data.response.code):'')); if(data.fatal){$('msg').textContent='No se puede reproducir este canal. Prueba otro.';$('msg').classList.remove('hidden')}});hls.loadSource(src);hls.attachMedia(video);hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play().catch(()=>{}));}else{video.src=src;await video.play().catch(()=>{})}setTimeout(()=>{if(video.readyState<2){$('msg').textContent='El canal no entrega vídeo compatible o el proveedor bloquea el stream. Prueba otro canal.';$('msg').classList.remove('hidden')}},7000)}catch(e){log('Error reproducción: '+e.message)}}
$('video').addEventListener('playing',()=>{$('msg').classList.add('hidden');log('Reproduciendo: '+$('nowTitle').textContent)});$('video').addEventListener('error',()=>log('Error de vídeo del navegador.'));
$('loadBtn').onclick=()=>loadList().catch(e=>{log('Error: '+e.message);alert('No se pudo cargar: '+e.message)});$('clearBtn').onclick=()=>{localStorage.removeItem('bioiptv_m3u');location.reload()};$('search').oninput=renderList;$('groupSelect').onchange=renderList;$('adultToggle').onchange=renderList;document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');mode=b.dataset.mode;renderList()});$('favBtn').onclick=()=>{const c=channels[current];if(!c)return;if(favs.has(c.url))favs.delete(c.url);else favs.add(c.url);localStorage.bioiptv_favs=JSON.stringify([...favs]);$('favBtn').textContent=favs.has(c.url)?'★ Favorito':'☆ Favorito';renderList()};$('prevBtn').onclick=()=>{const idx=filtered.findIndex(c=>c.url===channels[current]?.url);play(filtered[Math.max(0,idx-1)])};$('nextBtn').onclick=()=>{const idx=filtered.findIndex(c=>c.url===channels[current]?.url);play(filtered[Math.min(filtered.length-1,idx+1)])};$('fullBtn').onclick=()=>$('video').requestFullscreen?.();
let deferred;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferred=e;$('installBtn').classList.remove('hidden')});$('installBtn').onclick=()=>deferred?.prompt();
</script>
</body></html>
