<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <title>BioIPTV</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18/dist/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo">TV</div>
        <div>
          <h1>BioIPTV</h1>
          <p>Reproductor privado M3U · sin anuncios</p>
        </div>
      </div>
      <button id="installBtn" class="ghost hidden">Instalar app</button>
      <button id="settingsBtn" class="ghost">Ajustes</button>
    </header>

    <section id="setupPanel" class="setup card">
      <div class="setup-grid">
        <label>
          <span>URL M3U</span>
          <input id="m3uUrl" type="password" placeholder="Pega aquí tu URL M3U" autocomplete="off" />
        </label>
        <label>
          <span>Proxy Cloudflare Worker</span>
          <input id="proxyUrl" type="text" placeholder="https://tu-worker.workers.dev/" />
        </label>
        <div class="setup-actions">
          <button id="loadBtn" class="primary">Cargar lista</button>
          <button id="clearBtn" class="danger">Borrar datos</button>
        </div>
      </div>
      <p class="hint">Solo se guardan la URL, favoritos y ajustes. La lista se descarga al abrir para evitar límites del navegador.</p>
    </section>

    <main class="layout">
      <aside class="sidebar card">
        <div class="sidebar-head">
          <h2>Canales</h2>
          <span id="channelCount">0</span>
        </div>
        <input id="searchInput" class="search" type="search" placeholder="Buscar canal..." />
        <div class="quick-tabs">
          <button data-view="all" class="active">Todos</button>
          <button data-view="favorites">Favoritos</button>
          <button data-view="recent">Recientes</button>
        </div>
        <label class="adult-toggle"><input id="adultToggle" type="checkbox" /> Mostrar adultos</label>
        <select id="groupSelect" class="group-select"><option value="__all__">Todas las categorías</option></select>
        <div id="categoryChips" class="chips"></div>
        <div id="channelList" class="channel-list"></div>
      </aside>

      <section class="player-area card">
        <div class="player-frame">
          <video id="video" controls playsinline preload="metadata"></video>
          <div id="playerOverlay" class="player-overlay">
            <div class="spinner"></div>
            <p>Selecciona un canal</p>
          </div>
        </div>
        <div class="now-playing">
          <div class="np-left">
            <img id="nowLogo" alt="" class="now-logo hidden" />
            <div>
              <h2 id="nowTitle">Sin canal seleccionado</h2>
              <p id="nowGroup">Carga tu lista M3U para empezar.</p>
            </div>
          </div>
          <div class="np-actions">
            <button id="favBtn" class="ghost">☆ Favorito</button>
            <button id="prevBtn" class="ghost">Anterior</button>
            <button id="nextBtn" class="ghost">Siguiente</button>
            <button id="fullscreenBtn" class="primary">Pantalla completa</button>
          </div>
        </div>
        <div id="statusBox" class="status">Listo.</div>
      </section>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/m3u.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
